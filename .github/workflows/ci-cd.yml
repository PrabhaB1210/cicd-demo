# ============================================================
# CI/CD PIPELINE — IRCTC Demo App
# Book ref: Chapter 8, "The Professional Scrum Master"
#
# This pipeline implements the three-stage model described
# in the book: CI → Continuous Delivery → Continuous Deployment
# ============================================================

name: CI/CD Pipeline

# Trigger: runs on every push or pull request to main (trunk)
# This is "trunk-based development" as described in Chapter 8
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1: CONTINUOUS INTEGRATION (CI)
  # Runs on every commit/merge to trunk
  # Book: "merging code changes back to the main
  # branch as often as possible" + automated tests
  # ─────────────────────────────────────────────
  continuous-integration:
    name: "CI — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code (trunk)"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: "Install dependencies"
        run: npm ci

      - name: "Run Unit Tests"
        # Book ref: "Unit testing — used to test a single unit of code"
        run: npm run test:unit

      - name: "Run API/Service Tests"
        # Book ref: "API/service testing — testing the interface
        # between different code components or services"
        run: npm run test:api

      - name: "Upload test results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            junit.xml

  # ─────────────────────────────────────────────
  # STAGE 2: CONTINUOUS DELIVERY (CD)
  # Auto-deploy to STAGING after CI passes
  # Book: "automatically deploying all code changes
  # to a staging or pre-production environment
  # after the build stage"
  # ─────────────────────────────────────────────
  continuous-delivery:
    name: "CD — Deploy to Staging"
    runs-on: ubuntu-latest
    needs: continuous-integration   # only runs if CI passes
    if: github.ref == 'refs/heads/main'

    environment:
      name: staging
      url: https://irctc-demo-staging.onrender.com  # replace with your staging URL

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Deploy to Staging (Render / Railway / Heroku)"
        # In a real project, replace this with your deploy command, e.g.:
        #   run: npx render-cli deploy --service-id ${{ secrets.RENDER_STAGING_ID }}
        # For demo purposes, we simulate the deploy step:
        run: |
          echo "✅ CI passed. Deploying to STAGING environment..."
          echo "   Staging URL: https://irctc-demo-staging.onrender.com"
          echo "   Commit: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "✅ Staging deployment complete."

      - name: "Run Smoke Tests on Staging"
        # Book ref: "Smoke testing — checks basic functionality
        # after a release, to ensure major features are working"
        run: |
          npm ci
          npm run test:smoke
          echo "✅ Smoke tests passed on staging."

  # ─────────────────────────────────────────────
  # STAGE 3: CONTINUOUS DEPLOYMENT
  # Auto-release to PRODUCTION after staging passes
  # Book: "every change successfully deployed to
  # staging is automatically released to stakeholders
  # and customers"
  # ─────────────────────────────────────────────
  continuous-deployment:
    name: "CD — Deploy to Production"
    runs-on: ubuntu-latest
    needs: continuous-delivery       # only runs if staging passes
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://irctc-demo.onrender.com  # replace with your production URL

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Deploy to Production"
        # Replace with real deploy command for your platform
        run: |
          echo "🚀 Staging verified. Deploying to PRODUCTION..."
          echo "   Production URL: https://irctc-demo.onrender.com"
          echo "   Commit: ${{ github.sha }}"
          echo "✅ Production deployment complete. Increment is live!"
